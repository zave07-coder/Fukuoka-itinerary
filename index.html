<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WayWeave - Travel Itinerary Planner</title>
    <meta name="description" content="Plan and manage your travel itineraries with WayWeave">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: white;
        }

        .loader-container {
            text-align: center;
            animation: fadeIn 0.5s ease;
        }

        .logo {
            font-size: 4rem;
            margin-bottom: 1rem;
            animation: float 2s ease-in-out infinite;
        }

        .brand-name {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: 2px;
        }

        .tagline {
            font-size: 1.2rem;
            font-weight: 300;
            margin-bottom: 2rem;
            opacity: 0.9;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            margin: 0 auto;
            animation: spin 1s linear infinite;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body>
    <div class="loader-container">
        <div class="logo">✈️</div>
        <h1 class="brand-name">WayWeave</h1>
        <p class="tagline">Plan Your Adventures</p>
        <div class="spinner"></div>
    </div>

    <script>
        // Router logic - redirect based on URL parameters
        (function() {
            const urlParams = new URLSearchParams(window.location.search);
            const tripId = urlParams.get('trip');

            if (tripId) {
                // Redirect to trip viewer with trip ID
                window.location.href = `trip-planner-v2.html?trip=${tripId}`;
            } else {
                // Redirect to dashboard
                window.location.href = 'dashboard-v2.html';
            }
        })();
    </script>
</body>
</html>
