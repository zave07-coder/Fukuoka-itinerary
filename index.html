<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wahgola - Travel Itinerary Planner</title>
    <meta name="description" content="Plan and manage your travel itineraries with Wahgola">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: white;
        }

        .loader-container {
            text-align: center;
            animation: fadeIn 0.5s ease;
        }

        .logo {
            width: 120px;
            height: 120px;
            margin: 0 auto 1.5rem;
            animation: float 2s ease-in-out infinite;
        }

        .brand-name {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, #2563eb 0%, #f59e0b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .tagline {
            font-size: 1.2rem;
            font-weight: 300;
            margin-bottom: 2rem;
            opacity: 0.9;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            margin: 0 auto;
            animation: spin 1s linear infinite;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body>
    <div class="loader-container">
        <svg class="logo" viewBox="0 0 120 120" fill="none">
            <defs>
                <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
                </linearGradient>
            </defs>
            <circle cx="60" cy="60" r="50" stroke="url(#logoGrad)" stroke-width="6" opacity="0.3" fill="none"/>
            <path d="M60 10 C35 10 35 35 60 60 C85 35 85 10 60 10" stroke="url(#logoGrad)" stroke-width="6" fill="none"/>
            <path d="M10 60 C10 35 35 35 60 60 C35 85 10 85 10 60" stroke="url(#logoGrad)" stroke-width="6" fill="none"/>
            <circle cx="40" cy="40" r="8" fill="url(#logoGrad)"/>
            <circle cx="80" cy="40" r="8" fill="url(#logoGrad)"/>
            <circle cx="60" cy="80" r="8" fill="url(#logoGrad)"/>
        </svg>
        <h1 class="brand-name">Wahgola</h1>
        <p class="tagline">Plan Your Adventures</p>
        <div class="spinner"></div>
    </div>

    <script>
        // Router logic - redirect based on URL parameters
        (function() {
            const urlParams = new URLSearchParams(window.location.search);
            const tripId = urlParams.get('trip');

            if (tripId) {
                // Redirect to trip viewer with trip ID
                window.location.href = `trip-planner.html?trip=${tripId}`;
            } else {
                // Redirect to dashboard
                window.location.href = 'dashboard.html';
            }
        })();
    </script>
</body>
</html>
