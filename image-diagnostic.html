<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Diagnostic - Wahgola</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 40px 20px;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 { color: #333; margin-bottom: 30px; }
    .section {
      margin-bottom: 30px;
      padding: 20px;
      background: #f8f9fa;
      border-radius: 12px;
    }
    .section h2 {
      color: #667eea;
      margin-bottom: 16px;
      font-size: 20px;
    }
    .btn {
      background: #667eea;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-right: 12px;
      margin-bottom: 12px;
    }
    .btn:hover { background: #5568d3; }
    pre {
      background: #2d2d2d;
      color: #f8f8f2;
      padding: 16px;
      border-radius: 8px;
      overflow-x: auto;
      font-size: 13px;
      margin-top: 12px;
    }
    .result {
      margin-top: 16px;
      padding: 16px;
      background: white;
      border-radius: 8px;
      border: 2px solid #e0e0e0;
    }
    .success { border-color: #27ae60; background: #efd; }
    .error { border-color: #e74c3c; background: #fee; }
    .warning { border-color: #f39c12; background: #fef5e7; }
  </style>
  <script src="trip-manager.js?v=21"></script>
  <script src="config.js"></script>
</head>
<body>
  <div class="container">
    <h1>🖼️ Image Diagnostic Tool</h1>

    <div class="section">
      <h2>1. Check Local Trips for Cover Images</h2>
      <button class="btn" onclick="checkLocalTrips()">Check All Trips</button>
      <div id="localTripsResult"></div>
    </div>

    <div class="section">
      <h2>2. Test Google Places API (Cover Image)</h2>
      <button class="btn" onclick="testGooglePlacesCover()">Test Tokyo Tower</button>
      <button class="btn" onclick="testGooglePlacesCover('Marina Bay Sands')">Test Marina Bay Sands</button>
      <div id="coverImageResult"></div>
    </div>

    <div class="section">
      <h2>3. Test POI Image Service</h2>
      <button class="btn" onclick="testPOIImage()">Test Senso-ji Temple</button>
      <button class="btn" onclick="testPOIImage('Fushimi Inari Shrine', {lat: 34.9671, lng: 135.7727})">Test Fushimi Inari</button>
      <div id="poiImageResult"></div>
    </div>

    <div class="section">
      <h2>4. Check POI Image Service Loaded</h2>
      <button class="btn" onclick="checkPOIService()">Check Service</button>
      <div id="poiServiceResult"></div>
    </div>

    <div class="section">
      <h2>5. Check Environment Variables</h2>
      <button class="btn" onclick="checkEnvVars()">Check API Keys</button>
      <div id="envVarsResult"></div>
    </div>
  </div>

  <script>
    // 1. Check local trips
    function checkLocalTrips() {
      const resultDiv = document.getElementById('localTripsResult');
      const tripManager = new TripManager();
      const trips = tripManager.getAllTrips();

      let html = `<div class="result success">
        <strong>Found ${trips.length} trip(s) in localStorage</strong><br><br>`;

      trips.forEach((trip, idx) => {
        const hasCover = trip.coverImage && trip.coverImage !== '';
        html += `
          <div style="margin-bottom: 16px; padding: 12px; background: #f9f9f9; border-radius: 8px;">
            <strong>${idx + 1}. ${trip.name}</strong><br>
            <small>Destination: ${trip.destination || 'N/A'}</small><br>
            <small>Cover Image: ${hasCover ? '✅ Yes' : '❌ No'}</small><br>
            ${trip.coverImage ? `<img src="${trip.coverImage}" style="max-width: 200px; margin-top: 8px; border-radius: 4px;">` : '<small style="color: red;">No cover image</small>'}
          </div>
        `;
      });

      html += '</div>';
      resultDiv.innerHTML = html;
    }

    // 2. Test Google Places cover image
    async function testGooglePlacesCover(landmark = 'Tokyo Tower') {
      const resultDiv = document.getElementById('coverImageResult');
      resultDiv.innerHTML = '<div class="result">🔄 Testing Google Places API for: ' + landmark + '...</div>';

      try {
        const response = await fetch('/api/poi-image', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            poiName: landmark,
            location: null,
            category: 'attraction'
          })
        });

        const data = await response.json();

        resultDiv.innerHTML = `
          <div class="result success">
            <strong>✅ Success!</strong><br>
            <strong>POI:</strong> ${landmark}<br>
            <strong>Source:</strong> ${data.source}<br>
            <strong>Cached:</strong> ${data.cached ? 'Yes' : 'No'}<br>
            <strong>URL:</strong> <a href="${data.imageUrl}" target="_blank">View Image</a><br>
            <img src="${data.imageUrl}" style="max-width: 400px; margin-top: 12px; border-radius: 8px;">
            <pre>${JSON.stringify(data, null, 2)}</pre>
          </div>
        `;
      } catch (error) {
        resultDiv.innerHTML = `
          <div class="result error">
            <strong>❌ Error:</strong> ${error.message}
          </div>
        `;
      }
    }

    // 3. Test POI Image Service
    async function testPOIImage(poiName = 'Senso-ji Temple', location = {lat: 35.7148, lng: 139.7967}) {
      const resultDiv = document.getElementById('poiImageResult');
      resultDiv.innerHTML = '<div class="result">🔄 Testing POI image for: ' + poiName + '...</div>';

      try {
        const response = await fetch('/api/poi-image', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            poiName: poiName,
            location: location,
            category: 'temple'
          })
        });

        const data = await response.json();

        resultDiv.innerHTML = `
          <div class="result success">
            <strong>✅ Success!</strong><br>
            <strong>POI:</strong> ${poiName}<br>
            <strong>Source:</strong> ${data.source}<br>
            <strong>Cached:</strong> ${data.cached ? 'Yes' : 'No'}<br>
            <strong>URL:</strong> <a href="${data.imageUrl}" target="_blank">View Image</a><br>
            <img src="${data.imageUrl}" style="max-width: 400px; margin-top: 12px; border-radius: 8px;">
            <pre>${JSON.stringify(data, null, 2)}</pre>
          </div>
        `;
      } catch (error) {
        resultDiv.innerHTML = `
          <div class="result error">
            <strong>❌ Error:</strong> ${error.message}
          </div>
        `;
      }
    }

    // 4. Check POI Service
    function checkPOIService() {
      const resultDiv = document.getElementById('poiServiceResult');
      const exists = typeof window.poiImageService !== 'undefined';

      resultDiv.innerHTML = `
        <div class="result ${exists ? 'success' : 'error'}">
          <strong>${exists ? '✅' : '❌'} POI Image Service</strong><br>
          Status: ${exists ? 'Loaded' : 'Not loaded'}<br>
          ${exists ? `
            Cache size: ${window.poiImageService.cache ? window.poiImageService.cache.size : 0}
          ` : 'Service not available'}
        </div>
      `;
    }

    // 5. Check environment variables
    async function checkEnvVars() {
      const resultDiv = document.getElementById('envVarsResult');
      resultDiv.innerHTML = '<div class="result">🔄 Checking API configuration...</div>';

      try {
        const response = await fetch('/api/version');
        const data = await response.json();

        resultDiv.innerHTML = `
          <div class="result ${data.env.hasGooglePlacesApiKey ? 'success' : 'error'}">
            <strong>Environment Variables:</strong><br>
            Google Places API Key: ${data.env.hasGooglePlacesApiKey ? '✅ Configured' : '❌ Missing'}<br>
            OpenAI API Key: ${data.env.hasOpenAI ? '✅ Configured' : '❌ Missing'}<br>
            Supabase URL: ${data.env.hasSupabaseUrl ? '✅ Configured' : '❌ Missing'}<br>
            <pre>${JSON.stringify(data, null, 2)}</pre>
          </div>
        `;
      } catch (error) {
        resultDiv.innerHTML = `
          <div class="result error">
            <strong>❌ Error:</strong> ${error.message}
          </div>
        `;
      }
    }
  </script>
</body>
</html>
