<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth Test - Wahgola</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: monospace;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .section {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
        }
        .success { background: #d4edda; }
        .error { background: #f8d7da; }
        .info { background: #d1ecf1; }
        button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
        }
        pre {
            background: #f5f5f5;
            padding: 10px;
            overflow: auto;
        }
    </style>
</head>
<body>
    <h1>Wahgola Authentication Diagnostics</h1>

    <div class="section info">
        <h2>1. Config Status</h2>
        <div id="configStatus">Checking...</div>
        <pre id="configOutput"></pre>
    </div>

    <div class="section info">
        <h2>2. Supabase Client Status</h2>
        <div id="clientStatus">Checking...</div>
        <pre id="clientOutput"></pre>
    </div>

    <div class="section">
        <h2>3. Google OAuth Test</h2>
        <button onclick="testGoogleAuth()">Test Google Sign-In</button>
        <div id="authStatus"></div>
        <pre id="authOutput"></pre>
    </div>

    <div class="section">
        <h2>4. Session Check</h2>
        <button onclick="checkSession()">Check Current Session</button>
        <pre id="sessionOutput"></pre>
    </div>

    <script>
        let supabase = null;

        // Test 1: Check config loading
        async function checkConfig() {
            try {
                const response = await fetch(`/config.js?v=${Date.now()}`);
                const configText = await response.text();
                eval(configText);

                const configStatus = document.getElementById('configStatus');
                const configOutput = document.getElementById('configOutput');

                if (window.SUPABASE_CONFIG && window.SUPABASE_CONFIG.SUPABASE_URL) {
                    configStatus.innerHTML = '✅ Config loaded successfully';
                    configStatus.parentElement.className = 'section success';
                    configOutput.textContent = JSON.stringify(window.SUPABASE_CONFIG, null, 2);
                    return true;
                } else {
                    configStatus.innerHTML = '❌ Supabase config is null or invalid';
                    configStatus.parentElement.className = 'section error';
                    configOutput.textContent = 'window.SUPABASE_CONFIG = ' + JSON.stringify(window.SUPABASE_CONFIG);
                    return false;
                }
            } catch (error) {
                document.getElementById('configStatus').innerHTML = '❌ Error loading config';
                document.getElementById('configStatus').parentElement.className = 'section error';
                document.getElementById('configOutput').textContent = error.toString();
                return false;
            }
        }

        // Test 2: Initialize Supabase client
        async function initSupabase() {
            const clientStatus = document.getElementById('clientStatus');
            const clientOutput = document.getElementById('clientOutput');

            try {
                if (!window.SUPABASE_CONFIG || !window.SUPABASE_CONFIG.SUPABASE_URL) {
                    throw new Error('Config not loaded');
                }

                supabase = window.supabase.createClient(
                    window.SUPABASE_CONFIG.SUPABASE_URL,
                    window.SUPABASE_CONFIG.SUPABASE_ANON_KEY
                );

                clientStatus.innerHTML = '✅ Supabase client created';
                clientStatus.parentElement.className = 'section success';
                clientOutput.textContent = `URL: ${window.SUPABASE_CONFIG.SUPABASE_URL}\nAnon Key: ${window.SUPABASE_CONFIG.SUPABASE_ANON_KEY.substring(0, 20)}...`;
            } catch (error) {
                clientStatus.innerHTML = '❌ Failed to create Supabase client';
                clientStatus.parentElement.className = 'section error';
                clientOutput.textContent = error.toString();
            }
        }

        // Test 3: Test Google OAuth
        async function testGoogleAuth() {
            const authStatus = document.getElementById('authStatus');
            const authOutput = document.getElementById('authOutput');

            authStatus.innerHTML = 'Testing Google OAuth...';
            authOutput.textContent = '';

            try {
                if (!supabase) {
                    throw new Error('Supabase client not initialized');
                }

                authOutput.textContent += 'Calling signInWithOAuth...\n';

                const { data, error } = await supabase.auth.signInWithOAuth({
                    provider: 'google',
                    options: {
                        redirectTo: window.location.origin + '/dashboard-v2.html',
                        queryParams: {
                            access_type: 'offline',
                            prompt: 'consent',
                        }
                    }
                });

                if (error) {
                    authStatus.innerHTML = '❌ OAuth Error';
                    authStatus.parentElement.className = 'section error';
                    authOutput.textContent += '\nError:\n' + JSON.stringify(error, null, 2);
                } else {
                    authStatus.innerHTML = '✅ OAuth initiated (you should be redirected)';
                    authStatus.parentElement.className = 'section success';
                    authOutput.textContent += '\nSuccess:\n' + JSON.stringify(data, null, 2);
                }
            } catch (error) {
                authStatus.innerHTML = '❌ Exception thrown';
                authStatus.parentElement.className = 'section error';
                authOutput.textContent += '\nException:\n' + error.toString() + '\n\nStack:\n' + error.stack;
            }
        }

        // Test 4: Check session
        async function checkSession() {
            const sessionOutput = document.getElementById('sessionOutput');

            try {
                if (!supabase) {
                    throw new Error('Supabase client not initialized');
                }

                const { data: { session }, error } = await supabase.auth.getSession();

                if (error) {
                    sessionOutput.textContent = 'Error:\n' + JSON.stringify(error, null, 2);
                } else if (session) {
                    sessionOutput.textContent = 'Session found:\n' + JSON.stringify({
                        user: session.user.email,
                        expires_at: session.expires_at
                    }, null, 2);
                } else {
                    sessionOutput.textContent = 'No active session';
                }
            } catch (error) {
                sessionOutput.textContent = 'Exception:\n' + error.toString();
            }
        }

        // Run initial checks on load
        (async () => {
            const configOk = await checkConfig();
            if (configOk) {
                await initSupabase();
            }
        })();
    </script>
</body>
</html>
