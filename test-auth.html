<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wahgola Auth Diagnostic Tool</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 { color: #2563eb; margin-top: 0; }
        h2 { color: #334155; font-size: 18px; margin-top: 0; }
        .status { padding: 12px; border-radius: 8px; margin: 8px 0; }
        .success { background: #d1fae5; color: #065f46; }
        .error { background: #fee2e2; color: #991b1b; }
        .warning { background: #fef3c7; color: #92400e; }
        .info { background: #dbeafe; color: #1e40af; }
        pre {
            background: #1e293b;
            color: #e2e8f0;
            padding: 16px;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 14px;
        }
        button {
            background: #2563eb;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin: 8px 8px 8px 0;
        }
        button:hover { background: #1d4ed8; }
        .test-result { margin-top: 16px; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>🔍 Wahgola Auth Diagnostic Tool</h1>

    <div class="card">
        <h2>1. Configuration Check</h2>
        <div id="configStatus"></div>
    </div>

    <div class="card">
        <h2>2. Supabase Connection</h2>
        <div id="supabaseStatus"></div>
        <button onclick="testSupabaseConnection()">Test Connection</button>
    </div>

    <div class="card">
        <h2>3. Google OAuth Test</h2>
        <div id="oauthStatus"></div>
        <button onclick="testGoogleOAuth()">Test Google Login</button>
    </div>

    <div class="card">
        <h2>4. Environment Details</h2>
        <div id="envDetails"></div>
    </div>

    <script>
        let supabaseClient = null;

        // Check configuration
        async function checkConfig() {
            const statusDiv = document.getElementById('configStatus');
            let html = '';

            // Check if config.js is loaded
            try {
                const response = await fetch('/config.js');
                if (response.ok) {
                    html += '<div class="status success">✅ config.js file exists</div>';

                    // Check SUPABASE_CONFIG
                    if (window.SUPABASE_CONFIG) {
                        const { SUPABASE_URL, SUPABASE_ANON_KEY } = window.SUPABASE_CONFIG;

                        if (SUPABASE_URL && SUPABASE_ANON_KEY && SUPABASE_ANON_KEY !== 'YOUR_SUPABASE_ANON_KEY_HERE') {
                            html += '<div class="status success">✅ SUPABASE_CONFIG is set</div>';
                            html += '<div class="status info">🔗 Supabase URL: ' + SUPABASE_URL + '</div>';
                            html += '<div class="status info">🔑 Anon Key: ' + SUPABASE_ANON_KEY.substring(0, 20) + '...</div>';
                        } else {
                            html += '<div class="status error">❌ SUPABASE_CONFIG not properly configured</div>';
                            html += '<div class="status warning">⚠️ Please update config.js with your Supabase credentials</div>';
                        }
                    } else {
                        html += '<div class="status error">❌ SUPABASE_CONFIG not found in window</div>';
                    }

                    // Check MAPBOX_CONFIG
                    if (window.MAPBOX_CONFIG && window.MAPBOX_CONFIG.token) {
                        html += '<div class="status success">✅ MAPBOX_CONFIG is set</div>';
                    }
                } else {
                    html += '<div class="status error">❌ config.js not found</div>';
                }
            } catch (error) {
                html += '<div class="status error">❌ Error loading config.js: ' + error.message + '</div>';
            }

            statusDiv.innerHTML = html;
        }

        // Test Supabase connection
        async function testSupabaseConnection() {
            const statusDiv = document.getElementById('supabaseStatus');
            statusDiv.innerHTML = '<div class="status info">⏳ Testing Supabase connection...</div>';

            try {
                if (!window.SUPABASE_CONFIG || !window.SUPABASE_CONFIG.SUPABASE_URL) {
                    throw new Error('SUPABASE_CONFIG not configured. Please update config.js');
                }

                const { SUPABASE_URL, SUPABASE_ANON_KEY } = window.SUPABASE_CONFIG;

                // Create Supabase client
                supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

                // Test connection by checking session
                const { data, error } = await supabaseClient.auth.getSession();

                if (error) {
                    throw error;
                }

                let html = '<div class="status success">✅ Supabase connection successful!</div>';

                if (data.session) {
                    html += '<div class="status success">✅ Active session found</div>';
                    html += '<div class="status info">👤 User: ' + data.session.user.email + '</div>';
                } else {
                    html += '<div class="status info">ℹ️ No active session (not logged in)</div>';
                }

                statusDiv.innerHTML = html;
            } catch (error) {
                statusDiv.innerHTML = '<div class="status error">❌ Supabase connection failed: ' + error.message + '</div>';
                console.error('Supabase test error:', error);
            }
        }

        // Test Google OAuth
        async function testGoogleOAuth() {
            const statusDiv = document.getElementById('oauthStatus');
            statusDiv.innerHTML = '<div class="status info">⏳ Initiating Google OAuth...</div>';

            try {
                if (!supabaseClient) {
                    if (!window.SUPABASE_CONFIG || !window.SUPABASE_CONFIG.SUPABASE_URL) {
                        throw new Error('Please configure Supabase first');
                    }
                    const { SUPABASE_URL, SUPABASE_ANON_KEY } = window.SUPABASE_CONFIG;
                    supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                }

                // Test OAuth configuration
                const { data, error } = await supabaseClient.auth.signInWithOAuth({
                    provider: 'google',
                    options: {
                        redirectTo: window.location.origin + '/dashboard-v2.html',
                        queryParams: {
                            access_type: 'offline',
                            prompt: 'consent',
                        }
                    }
                });

                if (error) {
                    throw error;
                }

                statusDiv.innerHTML = '<div class="status info">⏳ Redirecting to Google OAuth...</div>';
            } catch (error) {
                let html = '<div class="status error">❌ Google OAuth failed: ' + error.message + '</div>';
                html += '<h3>Common Issues:</h3>';
                html += '<div class="status warning">';
                html += '<p><strong>1. Supabase not configured:</strong> Update config.js with your Supabase credentials</p>';
                html += '<p><strong>2. Google provider not enabled:</strong> Enable Google in Supabase Dashboard → Authentication → Providers</p>';
                html += '<p><strong>3. Missing credentials:</strong> Add Google Client ID/Secret in Supabase</p>';
                html += '<p><strong>4. Redirect URI mismatch:</strong> Check Google Cloud Console redirect URIs</p>';
                html += '</div>';
                html += '<h3>Full Error:</h3>';
                html += '<pre>' + JSON.stringify(error, null, 2) + '</pre>';
                statusDiv.innerHTML = html;
                console.error('OAuth test error:', error);
            }
        }

        // Show environment details
        function showEnvironmentDetails() {
            const detailsDiv = document.getElementById('envDetails');
            const details = {
                'Current URL': window.location.href,
                'Origin': window.location.origin,
                'User Agent': navigator.userAgent,
                'Cookies Enabled': navigator.cookieEnabled,
                'Local Storage': typeof(Storage) !== 'undefined' ? 'Available' : 'Not available',
                'Supabase JS Loaded': typeof(window.supabase) !== 'undefined' ? 'Yes' : 'No'
            };

            let html = '';
            for (const [key, value] of Object.entries(details)) {
                html += '<div class="status info"><strong>' + key + ':</strong> ' + value + '</div>';
            }
            detailsDiv.innerHTML = html;
        }

        // Run checks on load
        window.addEventListener('DOMContentLoaded', async () => {
            await checkConfig();
            showEnvironmentDetails();
        });
    </script>
</body>
</html>
