<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google Places API Test - Wahgola</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 40px 20px;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 { color: #333; margin-bottom: 30px; }
    .test-section {
      margin-bottom: 30px;
      padding: 20px;
      background: #f8f9fa;
      border-radius: 12px;
    }
    .btn {
      background: #667eea;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-right: 12px;
      margin-bottom: 12px;
    }
    .btn:hover { background: #5568d3; }
    .result {
      margin-top: 16px;
      padding: 16px;
      background: white;
      border-radius: 8px;
      border: 2px solid #e0e0e0;
    }
    .success { border-color: #27ae60; background: #efd; }
    .error { border-color: #e74c3c; background: #fee; }
    pre {
      background: #2d2d2d;
      color: #f8f8f2;
      padding: 16px;
      border-radius: 8px;
      overflow-x: auto;
      font-size: 13px;
      margin-top: 12px;
      max-height: 400px;
    }
    .image-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }
    .image-card {
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      overflow: hidden;
      background: white;
    }
    .image-card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }
    .image-info {
      padding: 12px;
    }
    .source-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .source-google { background: #4285f4; color: white; }
    .source-unsplash { background: #000; color: white; }
    .source-placeholder { background: #999; color: white; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧪 Google Places API Direct Test</h1>

    <div class="test-section">
      <h2>Test Famous Landmarks (Should use Google Places)</h2>
      <button class="btn" onclick="testLandmark('Tokyo Tower', 35.6586, 139.7454)">Tokyo Tower</button>
      <button class="btn" onclick="testLandmark('Eiffel Tower', 48.8584, 2.2945)">Eiffel Tower</button>
      <button class="btn" onclick="testLandmark('Statue of Liberty', 40.6892, -74.0445)">Statue of Liberty</button>
      <button class="btn" onclick="testLandmark('Marina Bay Sands', 1.2834, 103.8607)">Marina Bay Sands</button>
      <button class="btn" onclick="testLandmark('Burj Khalifa', 25.1972, 55.2744)">Burj Khalifa</button>
      <div id="landmarkResults"></div>
    </div>

    <div class="test-section">
      <h2>Test Temples (POI with location)</h2>
      <button class="btn" onclick="testPOI('Senso-ji Temple', 35.7148, 139.7967, 'temple')">Senso-ji Temple</button>
      <button class="btn" onclick="testPOI('Fushimi Inari Shrine', 34.9671, 135.7727, 'shrine')">Fushimi Inari</button>
      <button class="btn" onclick="testPOI('Kinkaku-ji', 35.0394, 135.7292, 'temple')">Kinkaku-ji</button>
      <div id="poiResults"></div>
    </div>

    <div class="test-section">
      <h2>Batch Test Results</h2>
      <button class="btn" onclick="runBatchTest()">Run All Tests</button>
      <button class="btn" onclick="clearResults()">Clear Results</button>
      <div id="batchResults"></div>
    </div>
  </div>

  <script>
    const results = [];

    async function testLandmark(name, lat, lng) {
      const resultDiv = document.getElementById('landmarkResults');
      resultDiv.innerHTML = '<div class="result">🔄 Testing ' + name + '...</div>';

      try {
        const response = await fetch('/api/poi-image', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            poiName: name,
            location: { lat, lng },
            category: 'attraction'
          })
        });

        const data = await response.json();
        results.push({ name, ...data });

        displayResult(name, data, 'landmarkResults');
      } catch (error) {
        resultDiv.innerHTML = `<div class="result error"><strong>❌ Error:</strong> ${error.message}</div>`;
      }
    }

    async function testPOI(name, lat, lng, category) {
      const resultDiv = document.getElementById('poiResults');
      resultDiv.innerHTML = '<div class="result">🔄 Testing ' + name + '...</div>';

      try {
        const response = await fetch('/api/poi-image', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            poiName: name,
            location: { lat, lng },
            category: category
          })
        });

        const data = await response.json();
        results.push({ name, ...data });

        displayResult(name, data, 'poiResults');
      } catch (error) {
        resultDiv.innerHTML = `<div class="result error"><strong>❌ Error:</strong> ${error.message}</div>`;
      }
    }

    function displayResult(name, data, targetDiv) {
      const sourceClass = data.source === 'google-new' ? 'source-google' : 
                         data.source === 'unsplash' ? 'source-unsplash' : 
                         'source-placeholder';

      const html = `
        <div class="result success">
          <strong>✅ ${name}</strong><br>
          <span class="source-badge ${sourceClass}">${data.source.toUpperCase()}</span><br>
          <strong>Cached:</strong> ${data.cached ? 'Yes' : 'No'}<br>
          ${data.attribution ? `<strong>Attribution:</strong> ${data.attribution}<br>` : ''}
          <img src="${data.imageUrl}" style="max-width: 400px; margin-top: 12px; border-radius: 8px;" 
               onerror="this.style.border='3px solid red'; this.alt='Failed to load'">
          <pre>${JSON.stringify(data, null, 2)}</pre>
        </div>
      `;

      document.getElementById(targetDiv).innerHTML = html;
    }

    async function runBatchTest() {
      const batchDiv = document.getElementById('batchResults');
      batchDiv.innerHTML = '<div class="result">🔄 Running batch tests...</div>';

      const tests = [
        { name: 'Tokyo Tower', lat: 35.6586, lng: 139.7454, category: 'attraction' },
        { name: 'Eiffel Tower', lat: 48.8584, lng: 2.2945, category: 'attraction' },
        { name: 'Marina Bay Sands', lat: 1.2834, lng: 103.8607, category: 'attraction' },
        { name: 'Senso-ji Temple', lat: 35.7148, lng: 139.7967, category: 'temple' },
        { name: 'Fushimi Inari Shrine', lat: 34.9671, lng: 135.7727, category: 'shrine' }
      ];

      const batchResults = [];

      for (const test of tests) {
        try {
          const response = await fetch('/api/poi-image', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              poiName: test.name,
              location: { lat: test.lat, lng: test.lng },
              category: test.category
            })
          });

          const data = await response.json();
          batchResults.push({ name: test.name, ...data });
        } catch (error) {
          batchResults.push({ name: test.name, error: error.message });
        }
      }

      // Display summary
      const googleCount = batchResults.filter(r => r.source === 'google-new' || r.source === 'google-legacy').length;
      const unsplashCount = batchResults.filter(r => r.source === 'unsplash').length;
      const placeholderCount = batchResults.filter(r => r.source === 'placeholder').length;
      const errorCount = batchResults.filter(r => r.error).length;

      let html = `
        <div class="result success">
          <h3>📊 Batch Test Summary</h3>
          <strong>Total Tests:</strong> ${batchResults.length}<br>
          <strong>Google Places:</strong> ${googleCount} (${(googleCount/batchResults.length*100).toFixed(0)}%)<br>
          <strong>Unsplash:</strong> ${unsplashCount} (${(unsplashCount/batchResults.length*100).toFixed(0)}%)<br>
          <strong>Placeholder:</strong> ${placeholderCount} (${(placeholderCount/batchResults.length*100).toFixed(0)}%)<br>
          <strong>Errors:</strong> ${errorCount}<br>
        </div>

        <div class="image-grid">
      `;

      batchResults.forEach(result => {
        const sourceClass = result.source === 'google-new' ? 'source-google' : 
                           result.source === 'unsplash' ? 'source-unsplash' : 
                           'source-placeholder';

        html += `
          <div class="image-card">
            <img src="${result.imageUrl}" alt="${result.name}">
            <div class="image-info">
              <strong>${result.name}</strong><br>
              <span class="source-badge ${sourceClass}">${result.source ? result.source.toUpperCase() : 'ERROR'}</span><br>
              <small>Cached: ${result.cached ? 'Yes' : 'No'}</small>
            </div>
          </div>
        `;
      });

      html += '</div>';
      html += `<pre>${JSON.stringify(batchResults, null, 2)}</pre>`;

      batchDiv.innerHTML = html;
    }

    function clearResults() {
      document.getElementById('landmarkResults').innerHTML = '';
      document.getElementById('poiResults').innerHTML = '';
      document.getElementById('batchResults').innerHTML = '';
    }
  </script>
</body>
</html>
