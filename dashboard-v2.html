<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WayWeave - Your Travel Companion</title>
    <meta name="description" content="Plan, organize, and visualize your perfect trip">
    <link rel="stylesheet" href="dashboard-v2.css?v=1">
    <script src="trip-manager.js"></script>
    <script src="dashboard-v2.js?v=1" defer></script>
</head>
<body>
    <!-- ZONE 1: TOP BAR - Fixed, Always Visible -->
    <header class="top-bar">
        <div class="top-bar-content">
            <!-- Left: Logo -->
            <div class="logo-area">
                <svg class="logo-icon" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                <span class="logo-text">WayWeave</span>
            </div>

            <!-- Right: Actions -->
            <div class="top-bar-actions">
                <button class="search-toggle" id="searchToggle" aria-label="Search">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.35-4.35"></path>
                    </svg>
                </button>
                <button class="btn-primary btn-new-trip" id="newTripBtn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    <span>New Trip</span>
                </button>
            </div>
        </div>

        <!-- Search Bar (Hidden by default) -->
        <div class="search-bar" id="searchBar" style="display: none;">
            <div class="search-bar-content">
                <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.35-4.35"></path>
                </svg>
                <input type="text" id="searchInput" placeholder="Search your trips..." autocomplete="off">
                <button class="search-close" onclick="closeSearch()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <!-- ZONE 2: HERO SECTION - Only shows when no trips -->
    <section class="hero" id="heroSection" style="display: none;">
        <div class="hero-content">
            <h1 class="hero-title">Plan Your Perfect Journey</h1>
            <p class="hero-subtitle">AI-powered itineraries with real-time maps</p>
            <button class="btn-hero" onclick="document.getElementById('newTripBtn').click()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                    <circle cx="12" cy="10" r="3"></circle>
                </svg>
                <span>Create Your First Trip</span>
            </button>
        </div>

        <!-- Visual Background -->
        <div class="hero-visual">
            <div class="floating-card card-1"></div>
            <div class="floating-card card-2"></div>
            <div class="floating-card card-3"></div>
        </div>
    </section>

    <!-- ZONE 3: MAIN CONTENT - Trip Gallery -->
    <main class="main-content" id="mainContent">
        <!-- Section Header -->
        <div class="section-header">
            <div class="section-title-area">
                <h2 class="section-title">Your Trips</h2>
                <span class="trip-count" id="tripCount">0 trips</span>
            </div>
            <div class="section-actions">
                <select class="sort-select" id="sortSelect">
                    <option value="recent">Recently Updated</option>
                    <option value="name">Alphabetical</option>
                    <option value="upcoming">Upcoming Trips</option>
                    <option value="date">By Start Date</option>
                </select>
            </div>
        </div>

        <!-- Trip Grid - Visual First -->
        <div class="trips-grid" id="tripsGrid">
            <!-- Cards inserted by JS -->
        </div>
    </main>

    <!-- ZONE 4: MODALS -->

    <!-- AI Generation Modal - Step 1: Method Selection -->
    <div class="modal-overlay" id="methodModalOverlay" style="display: none;">
        <div class="modal-modern modal-method">
            <button class="modal-close-modern" onclick="closeMethodModal()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>

            <div class="modal-header-modern">
                <h2>Create New Trip</h2>
                <p>Choose how you'd like to start</p>
            </div>

            <div class="method-cards">
                <!-- Method 1: AI Generation -->
                <button class="method-card method-featured" onclick="openAIModal()">
                    <div class="method-icon method-icon-ai">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
                            <path d="M2 17l10 5 10-5"></path>
                            <path d="M2 12l10 5 10-5"></path>
                        </svg>
                    </div>
                    <div class="method-content">
                        <h3>Generate with AI</h3>
                        <p>Describe your trip and let AI create a detailed itinerary</p>
                        <span class="method-badge">Recommended</span>
                    </div>
                    <svg class="method-arrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </button>

                <!-- Method 2: Start Blank -->
                <button class="method-card" onclick="startBlankTrip()">
                    <div class="method-icon">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                        </svg>
                    </div>
                    <div class="method-content">
                        <h3>Start from Scratch</h3>
                        <p>Create an empty itinerary and build it yourself</p>
                    </div>
                    <svg class="method-arrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </button>

                <!-- Method 3: Use Template -->
                <button class="method-card method-disabled" disabled>
                    <div class="method-icon">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="7" height="7"></rect>
                            <rect x="14" y="3" width="7" height="7"></rect>
                            <rect x="14" y="14" width="7" height="7"></rect>
                            <rect x="3" y="14" width="7" height="7"></rect>
                        </svg>
                    </div>
                    <div class="method-content">
                        <h3>Browse Templates</h3>
                        <p>Start with pre-made itineraries for popular destinations</p>
                        <span class="method-badge method-badge-soon">Coming Soon</span>
                    </div>
                </button>
            </div>
        </div>
    </div>

    <!-- AI Generation Modal - Step 2: Prompt Input -->
    <div class="modal-overlay" id="aiModalOverlay" style="display: none;">
        <div class="modal-modern modal-ai">
            <button class="modal-close-modern" onclick="closeAIModal()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>

            <div class="modal-header-modern">
                <button class="back-btn" onclick="backToMethodModal()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                </button>
                <div>
                    <h2>Generate Trip with AI</h2>
                    <p>Describe your perfect adventure</p>
                </div>
            </div>

            <div class="ai-form">
                <!-- Main Prompt -->
                <div class="form-group-modern">
                    <label>Tell us about your trip</label>
                    <textarea
                        id="aiPrompt"
                        placeholder="E.g., &quot;5-day cultural trip to Kyoto with temples, tea ceremonies, and traditional food. Relaxed pace for a couple.&quot;"
                        rows="4"
                    ></textarea>
                    <span class="char-count">0 / 2000</span>
                </div>

                <!-- Quick Tags -->
                <div class="form-group-modern">
                    <label>Quick options (optional)</label>
                    <div class="tag-grid">
                        <button class="tag-btn" data-tag="destination">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                                <circle cx="12" cy="10" r="3"></circle>
                            </svg>
                            Destination
                        </button>
                        <button class="tag-btn" data-tag="duration">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10"></circle>
                                <polyline points="12 6 12 12 16 14"></polyline>
                            </svg>
                            Duration
                        </button>
                        <button class="tag-btn" data-tag="style">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path>
                            </svg>
                            Travel Style
                        </button>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="modal-actions">
                    <button class="btn-secondary" onclick="closeAIModal()">Cancel</button>
                    <button class="btn-primary" id="generateBtn" onclick="generateTrip()">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
                            <path d="M2 17l10 5 10-5"></path>
                            <path d="M2 12l10 5 10-5"></path>
                        </svg>
                        <span>Generate Trip</span>
                    </button>
                </div>
            </div>

            <!-- Loading State -->
            <div class="loading-state" id="loadingState" style="display: none;">
                <div class="loading-animation">
                    <div class="spinner"></div>
                </div>
                <h3>Creating your itinerary...</h3>
                <p id="loadingMessage">Analyzing destinations and activities</p>
            </div>
        </div>
    </div>

    <!-- Preview Modal - Step 3: Review Generated Trip -->
    <div class="modal-overlay" id="previewModalOverlay" style="display: none;">
        <div class="modal-modern modal-preview">
            <button class="modal-close-modern" onclick="closePreviewModal()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>

            <div class="preview-content" id="previewContent">
                <!-- Populated by JS -->
            </div>

            <div class="modal-actions modal-actions-sticky">
                <button class="btn-secondary" onclick="closePreviewModal()">Cancel</button>
                <button class="btn-primary btn-large" onclick="saveGeneratedTrip()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                    <span>Save Trip</span>
                </button>
            </div>
        </div>
    </div>

</body>
</html>
