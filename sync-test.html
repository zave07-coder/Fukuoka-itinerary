<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sync Test Tool - Wahgola</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    h1 {
      font-size: 32px;
      color: #1a202c;
      margin-bottom: 12px;
    }

    .subtitle {
      color: #718096;
      margin-bottom: 32px;
      font-size: 16px;
    }

    .section {
      margin-bottom: 32px;
      padding: 24px;
      background: #f7fafc;
      border-radius: 12px;
      border-left: 4px solid #667eea;
    }

    .section h2 {
      font-size: 20px;
      color: #2d3748;
      margin-bottom: 16px;
    }

    .status-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 16px;
    }

    .status-item {
      padding: 16px;
      background: white;
      border-radius: 8px;
      border: 1px solid #e2e8f0;
    }

    .status-label {
      font-size: 12px;
      color: #718096;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .status-value {
      font-size: 18px;
      font-weight: 600;
      color: #2d3748;
    }

    .status-value.success {
      color: #38a169;
    }

    .status-value.error {
      color: #e53e3e;
    }

    .status-value.warning {
      color: #d69e2e;
    }

    .btn-group {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    button {
      padding: 12px 24px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    button:hover {
      background: #5568d3;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    button:disabled {
      background: #cbd5e0;
      cursor: not-allowed;
      transform: none;
    }

    button.secondary {
      background: #4a5568;
    }

    button.secondary:hover {
      background: #2d3748;
    }

    button.danger {
      background: #e53e3e;
    }

    button.danger:hover {
      background: #c53030;
    }

    #log {
      background: #1a202c;
      color: #48bb78;
      padding: 20px;
      border-radius: 8px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.6;
      max-height: 400px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    #log:empty::before {
      content: 'Run a test to see output...';
      color: #718096;
    }

    .log-line {
      margin-bottom: 4px;
    }

    .log-line.success {
      color: #48bb78;
    }

    .log-line.error {
      color: #f56565;
    }

    .log-line.warning {
      color: #ed8936;
    }

    .log-line.info {
      color: #4299e1;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 16px;
    }

    th, td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #e2e8f0;
    }

    th {
      background: white;
      font-weight: 600;
      color: #2d3748;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    td {
      font-size: 14px;
      color: #4a5568;
    }

    .badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .badge.success {
      background: #c6f6d5;
      color: #22543d;
    }

    .badge.error {
      background: #fed7d7;
      color: #742a2a;
    }

    .loading {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid #e2e8f0;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-left: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔄 Sync Test Tool</h1>
    <p class="subtitle">Diagnose and fix sync issues</p>

    <!-- Status Overview -->
    <div class="section">
      <h2>📊 Current Status</h2>
      <div class="status-grid">
        <div class="status-item">
          <div class="status-label">Authentication</div>
          <div class="status-value" id="authStatus">Checking...</div>
        </div>
        <div class="status-item">
          <div class="status-label">Local Trips</div>
          <div class="status-value" id="localTrips">-</div>
        </div>
        <div class="status-item">
          <div class="status-label">Cloud Trips</div>
          <div class="status-value" id="cloudTrips">-</div>
        </div>
        <div class="status-item">
          <div class="status-label">Last Sync</div>
          <div class="status-value" id="lastSync">Never</div>
        </div>
        <div class="status-item">
          <div class="status-label">Device ID</div>
          <div class="status-value" id="deviceId" style="font-size: 12px;">-</div>
        </div>
        <div class="status-item">
          <div class="status-label">Sync Status</div>
          <div class="status-value" id="syncStatus">Idle</div>
        </div>
      </div>
    </div>

    <!-- Actions -->
    <div class="section">
      <h2>🛠️ Actions</h2>
      <div class="btn-group">
        <button onclick="runDiagnostic()">Run Full Diagnostic</button>
        <button onclick="manualSync()">Sync Now</button>
        <button onclick="checkLocalTrips()">Check Local Trips</button>
        <button onclick="checkCloudTrips()">Check Cloud Trips</button>
        <button onclick="repairSync()" class="secondary">Repair Sync Status</button>
        <button onclick="clearLog()" class="secondary">Clear Log</button>
        <button onclick="resetSync()" class="danger">Reset & Resync</button>
      </div>
    </div>

    <!-- Trips Comparison -->
    <div class="section">
      <h2>📋 Trips Comparison</h2>
      <table id="tripsTable">
        <thead>
          <tr>
            <th>Trip Name</th>
            <th>Location</th>
            <th>Local</th>
            <th>Cloud</th>
            <th>Synced</th>
          </tr>
        </thead>
        <tbody id="tripsTableBody">
          <tr>
            <td colspan="5" style="text-align: center; color: #718096;">Run diagnostic to see trips</td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Log Output -->
    <div class="section">
      <h2>📝 Log Output</h2>
      <div id="log"></div>
    </div>
  </div>

  <!-- Load dependencies -->
  <script src="config.js"></script>
  <script src="trip-manager.js"></script>
  <script src="auth-service.js"></script>
  <script src="sync-service.js"></script>

  <script>
    // Logging utilities
    function log(message, type = 'info') {
      const logEl = document.getElementById('log');
      const line = document.createElement('div');
      line.className = `log-line ${type}`;
      const timestamp = new Date().toLocaleTimeString();
      line.textContent = `[${timestamp}] ${message}`;
      logEl.appendChild(line);
      logEl.scrollTop = logEl.scrollHeight;
      console.log(message);
    }

    function clearLog() {
      document.getElementById('log').innerHTML = '';
    }

    // Update status display
    function updateStatus() {
      // Auth status
      const isAuth = authService?.isAuthenticatedSync() || false;
      const user = authService?.getCurrentUser();
      const authEl = document.getElementById('authStatus');
      if (isAuth && user) {
        authEl.textContent = `✅ ${user.email}`;
        authEl.className = 'status-value success';
      } else {
        authEl.textContent = '❌ Not signed in';
        authEl.className = 'status-value error';
      }

      // Local trips
      const tripManager = new TripManager();
      const localTrips = tripManager.getAllTrips();
      document.getElementById('localTrips').textContent = localTrips.length;

      // Last sync
      const syncStatus = syncService?.getSyncStatus();
      const lastSyncEl = document.getElementById('lastSync');
      if (syncStatus?.lastSync) {
        const minutes = Math.floor((Date.now() - syncStatus.lastSync.getTime()) / 60000);
        lastSyncEl.textContent = minutes === 0 ? 'Just now' : `${minutes}m ago`;
      } else {
        lastSyncEl.textContent = 'Never';
      }

      // Device ID
      document.getElementById('deviceId').textContent = syncStatus?.deviceId || '-';

      // Sync status
      const syncStatusEl = document.getElementById('syncStatus');
      if (syncStatus?.syncing) {
        syncStatusEl.textContent = 'Syncing...';
        syncStatusEl.className = 'status-value warning';
      } else {
        syncStatusEl.textContent = 'Idle';
        syncStatusEl.className = 'status-value';
      }
    }

    // Run full diagnostic
    async function runDiagnostic() {
      clearLog();
      log('🔍 Running full diagnostic...', 'info');

      // Check auth
      log('\n1️⃣ Authentication Check', 'info');
      const isAuth = authService?.isAuthenticatedSync() || false;
      const user = authService?.getCurrentUser();
      if (isAuth && user) {
        log(`✅ Authenticated as ${user.email}`, 'success');
      } else {
        log('❌ Not authenticated - please sign in', 'error');
        updateStatus();
        return;
      }

      // Check local trips
      log('\n2️⃣ Local Storage Check', 'info');
      const tripManager = new TripManager();
      const localTrips = tripManager.getAllTrips();
      log(`📦 Found ${localTrips.length} trips in localStorage`, 'info');
      localTrips.forEach(trip => {
        const syncedIcon = trip.cloudSynced ? '✅' : '❌';
        log(`  ${syncedIcon} ${trip.name} | Last sync: ${trip.lastSyncAt || 'never'}`, 'info');
      });

      // Check cloud trips
      log('\n3️⃣ Cloud API Check', 'info');
      try {
        const token = await authService.getAccessToken();
        const response = await fetch('/api/trips', {
          headers: { 'Authorization': `Bearer ${token}` }
        });

        if (response.ok) {
          const cloudTrips = await response.json();
          log(`☁️  Found ${cloudTrips.length} trips in cloud`, 'success');
          document.getElementById('cloudTrips').textContent = cloudTrips.length;

          // Update table
          updateTripsTable(localTrips, cloudTrips);

          cloudTrips.forEach(trip => {
            log(`  ☁️  ${trip.name || trip.data?.name}`, 'info');
          });

          // Compare
          log('\n4️⃣ Comparison', 'info');
          const localIds = new Set(localTrips.map(t => t.id));
          const cloudIds = new Set(cloudTrips.map(t => t.id));

          const onlyLocal = localTrips.filter(t => !cloudIds.has(t.id));
          const onlyCloud = cloudTrips.filter(t => !localIds.has(t.id));
          const inBoth = localTrips.filter(t => cloudIds.has(t.id));

          log(`📊 In both: ${inBoth.length}`, 'info');
          log(`📊 Only local: ${onlyLocal.length}`, onlyLocal.length > 0 ? 'warning' : 'info');
          log(`📊 Only cloud: ${onlyCloud.length}`, onlyCloud.length > 0 ? 'warning' : 'info');

          if (onlyLocal.length > 0) {
            log('⚠️  Some trips need to be pushed to cloud', 'warning');
          }
          if (onlyCloud.length > 0) {
            log('⚠️  Some trips need to be pulled from cloud', 'warning');
          }

        } else {
          log(`❌ Failed to fetch cloud trips: ${response.status}`, 'error');
        }
      } catch (error) {
        log(`❌ Cloud API error: ${error.message}`, 'error');
      }

      log('\n✅ Diagnostic complete', 'success');
      updateStatus();
    }

    // Update trips comparison table
    function updateTripsTable(localTrips, cloudTrips) {
      const tbody = document.getElementById('tripsTableBody');
      tbody.innerHTML = '';

      const allTripIds = new Set([
        ...localTrips.map(t => t.id),
        ...cloudTrips.map(t => t.id)
      ]);

      allTripIds.forEach(id => {
        const localTrip = localTrips.find(t => t.id === id);
        const cloudTrip = cloudTrips.find(t => t.id === id);

        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${localTrip?.name || cloudTrip?.name || cloudTrip?.data?.name || '-'}</td>
          <td>${localTrip?.destination || cloudTrip?.destination || cloudTrip?.data?.destination || '-'}</td>
          <td>${localTrip ? '<span class="badge success">✓</span>' : '<span class="badge error">✗</span>'}</td>
          <td>${cloudTrip ? '<span class="badge success">✓</span>' : '<span class="badge error">✗</span>'}</td>
          <td>${localTrip?.cloudSynced ? '<span class="badge success">✓</span>' : '<span class="badge error">✗</span>'}</td>
        `;
        tbody.appendChild(row);
      });
    }

    // Manual sync
    async function manualSync() {
      log('🔄 Starting manual sync...', 'info');
      try {
        await syncService.syncAll();
        log('✅ Sync completed successfully', 'success');
        updateStatus();
        await runDiagnostic();
      } catch (error) {
        log(`❌ Sync failed: ${error.message}`, 'error');
      }
    }

    // Check local trips
    function checkLocalTrips() {
      log('📦 Checking local trips...', 'info');
      const tripManager = new TripManager();
      const trips = tripManager.getAllTrips();
      log(`Found ${trips.length} trips`, 'info');
      trips.forEach(trip => {
        log(`  - ${trip.name} (${trip.destination || 'No destination'})`, 'info');
        log(`    ID: ${trip.id}`, 'info');
        log(`    Synced: ${trip.cloudSynced ? 'Yes' : 'No'}`, trip.cloudSynced ? 'success' : 'warning');
        log(`    Last sync: ${trip.lastSyncAt || 'Never'}`, 'info');
      });
      updateStatus();
    }

    // Check cloud trips
    async function checkCloudTrips() {
      log('☁️  Checking cloud trips...', 'info');
      try {
        const token = await authService.getAccessToken();
        const response = await fetch('/api/trips', {
          headers: { 'Authorization': `Bearer ${token}` }
        });

        if (response.ok) {
          const trips = await response.json();
          log(`Found ${trips.length} trips in cloud`, 'success');
          document.getElementById('cloudTrips').textContent = trips.length;
          trips.forEach(trip => {
            log(`  - ${trip.name || trip.data?.name} (${trip.destination || trip.data?.destination || 'No destination'})`, 'info');
            log(`    Updated: ${trip.updated_at}`, 'info');
          });
        } else {
          log(`Failed to fetch: ${response.status}`, 'error');
        }
      } catch (error) {
        log(`Error: ${error.message}`, 'error');
      }
    }

    // Repair sync status
    async function repairSync() {
      log('🔧 Repairing sync status...', 'info');
      try {
        const token = await authService.getAccessToken();
        const response = await fetch('/api/trips', {
          headers: { 'Authorization': `Bearer ${token}` }
        });

        if (!response.ok) throw new Error('Failed to fetch cloud trips');

        const cloudTrips = await response.json();
        const cloudIds = new Set(cloudTrips.map(t => t.id));

        const tripManager = new TripManager();
        const localTrips = tripManager.getAllTrips();
        let fixed = 0;

        for (const trip of localTrips) {
          const inCloud = cloudIds.has(trip.id);
          if (trip.cloudSynced !== inCloud) {
            tripManager.updateTrip(trip.id, {
              cloudSynced: inCloud,
              lastSyncAt: inCloud ? new Date().toISOString() : null
            });
            fixed++;
            log(`${inCloud ? '✅' : '❌'} ${trip.name}: marked as ${inCloud ? 'synced' : 'not synced'}`, 'info');
          }
        }

        log(`✅ Repaired ${fixed} trips`, 'success');
        updateStatus();
      } catch (error) {
        log(`❌ Repair failed: ${error.message}`, 'error');
      }
    }

    // Reset and resync
    async function resetSync() {
      if (!confirm('This will clear all sync metadata and resync. Continue?')) {
        return;
      }

      log('🗑️ Resetting sync...', 'warning');
      const tripManager = new TripManager();
      const trips = tripManager.getAllTrips();

      for (const trip of trips) {
        tripManager.updateTrip(trip.id, {
          cloudSynced: false,
          lastSyncAt: null
        });
      }

      syncService.lastSyncTime = null;
      log('✅ Reset complete', 'success');
      log('🔄 Starting fresh sync...', 'info');
      await manualSync();
    }

    // Initialize
    window.addEventListener('DOMContentLoaded', () => {
      log('🚀 Sync Test Tool initialized', 'info');
      updateStatus();

      // Auto-update status every 5 seconds
      setInterval(updateStatus, 5000);
    });
  </script>
</body>
</html>
