<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sync Status - Wahgola</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 40px 20px;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 {
      color: #333;
      margin-bottom: 10px;
      font-size: 32px;
    }
    .subtitle {
      color: #666;
      margin-bottom: 30px;
      font-size: 16px;
    }
    .status-card {
      background: #f8f9fa;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
      border-left: 4px solid #667eea;
    }
    .status-card h2 {
      color: #333;
      font-size: 20px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status-row {
      display: flex;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid #e0e0e0;
    }
    .status-row:last-child {
      border-bottom: none;
    }
    .status-label {
      color: #666;
      font-weight: 500;
    }
    .status-value {
      color: #333;
      font-weight: 600;
      font-family: 'Courier New', monospace;
    }
    .btn {
      background: #667eea;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn:hover {
      background: #5568d3;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }
    .btn:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
    }
    .loading {
      color: #667eea;
      font-style: italic;
    }
    .error {
      color: #e74c3c;
      background: #fee;
      padding: 16px;
      border-radius: 8px;
      margin-top: 16px;
    }
    .success {
      color: #27ae60;
      background: #efd;
      padding: 16px;
      border-radius: 8px;
      margin-top: 16px;
    }
    pre {
      background: #2d2d2d;
      color: #f8f8f2;
      padding: 16px;
      border-radius: 8px;
      overflow-x: auto;
      font-size: 13px;
      line-height: 1.5;
      margin-top: 16px;
    }
    .actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }
  </style>
  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth-service.js"></script>
</head>
<body>
  <div class="container">
    <h1>🔄 Sync Status Diagnostics</h1>
    <p class="subtitle">Check your sync status and recent activity</p>

    <div id="authCheck" class="status-card">
      <h2>🔐 Authentication</h2>
      <div id="authStatus" class="loading">Checking...</div>
    </div>

    <div id="syncMetadata" class="status-card">
      <h2>📊 Sync Metadata</h2>
      <div id="syncStatus" class="loading">Loading...</div>
    </div>

    <div id="tripsData" class="status-card">
      <h2>✈️ Trips</h2>
      <div id="tripsStatus" class="loading">Loading...</div>
    </div>

    <div class="actions">
      <button class="btn" onclick="refreshStatus()">🔄 Refresh</button>
      <button class="btn" onclick="triggerSync()">🚀 Trigger Sync Now</button>
      <button class="btn" onclick="window.location.href='dashboard.html'">← Back to Dashboard</button>
    </div>
  </div>

  <script>
    let currentUser = null;

    async function checkAuth() {
      const authDiv = document.getElementById('authStatus');
      
      try {
        const isAuth = await authService.isAuthenticated();
        
        if (!isAuth) {
          authDiv.innerHTML = '<div class="error">❌ Not authenticated. Please <a href="login.html">login</a> first.</div>';
          return false;
        }

        const user = await authService.getUser();
        currentUser = user;

        authDiv.innerHTML = `
          <div class="success">✅ Authenticated</div>
          <div class="status-row">
            <span class="status-label">User ID:</span>
            <span class="status-value">${user.id}</span>
          </div>
          <div class="status-row">
            <span class="status-label">Email:</span>
            <span class="status-value">${user.email}</span>
          </div>
        `;

        return true;
      } catch (error) {
        authDiv.innerHTML = `<div class="error">❌ Error: ${error.message}</div>`;
        return false;
      }
    }

    async function checkSyncMetadata() {
      const statusDiv = document.getElementById('syncStatus');

      try {
        const token = await authService.getAccessToken();
        const response = await fetch('/api/sync', {
          headers: {
            'Authorization': `Bearer ${token}`
          }
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}: ${await response.text()}`);
        }

        const data = await response.json();

        statusDiv.innerHTML = `
          <div class="status-row">
            <span class="status-label">Device ID:</span>
            <span class="status-value">${data.device_id || 'N/A'}</span>
          </div>
          <div class="status-row">
            <span class="status-label">Last Sync:</span>
            <span class="status-value">${data.last_sync ? new Date(data.last_sync).toLocaleString() : 'Never'}</span>
          </div>
          <div class="status-row">
            <span class="status-label">Trip Count:</span>
            <span class="status-value">${data.trip_count || 0}</span>
          </div>
          <div class="status-row">
            <span class="status-label">Data Size:</span>
            <span class="status-value">${data.data_size_bytes ? (data.data_size_bytes / 1024).toFixed(2) + ' KB' : 'N/A'}</span>
          </div>
          <pre>${JSON.stringify(data, null, 2)}</pre>
        `;
      } catch (error) {
        statusDiv.innerHTML = `<div class="error">❌ Error: ${error.message}</div>`;
      }
    }

    async function checkTrips() {
      const statusDiv = document.getElementById('tripsStatus');

      try {
        const token = await authService.getAccessToken();
        const response = await fetch('/api/trips', {
          headers: {
            'Authorization': `Bearer ${token}`
          }
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}: ${await response.text()}`);
        }

        const trips = await response.json();

        if (trips.length === 0) {
          statusDiv.innerHTML = '<div class="error">No trips found in cloud.</div>';
          return;
        }

        const tripList = trips.map((trip, idx) => {
          const data = typeof trip.data === 'string' ? JSON.parse(trip.data) : trip.data;
          return `
            <div class="status-row">
              <span class="status-label">${idx + 1}. ${data.name || 'Untitled'}</span>
              <span class="status-value">${data.destination || 'N/A'} (${data.days?.length || 0} days)</span>
            </div>
          `;
        }).join('');

        statusDiv.innerHTML = `
          <div class="success">✅ Found ${trips.length} trip(s)</div>
          ${tripList}
          <pre>${JSON.stringify(trips, null, 2)}</pre>
        `;
      } catch (error) {
        statusDiv.innerHTML = `<div class="error">❌ Error: ${error.message}</div>`;
      }
    }

    async function triggerSync() {
      if (typeof syncService === 'undefined') {
        alert('Sync service not loaded. Please go to dashboard and try again.');
        return;
      }

      try {
        await syncService.syncNow();
        alert('✅ Sync triggered! Refreshing status...');
        await refreshStatus();
      } catch (error) {
        alert('❌ Sync failed: ' + error.message);
      }
    }

    async function refreshStatus() {
      const isAuth = await checkAuth();
      if (isAuth) {
        await Promise.all([
          checkSyncMetadata(),
          checkTrips()
        ]);
      }
    }

    // Auto-load on page load
    window.addEventListener('DOMContentLoaded', refreshStatus);
  </script>
</body>
</html>
